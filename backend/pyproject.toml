[tool.ruff]
line-length = 88
exclude = ["venv", ".venv", "__pycache__", "build", "dist", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["llama_index.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]