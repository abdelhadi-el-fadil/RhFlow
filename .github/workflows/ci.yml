name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run Ruff
        run: python -m ruff check backend/app backend/tests

      - name: Run Mypy
        run: python -m mypy backend/app backend/tests

      - name: Run tests
        env:
          APP_NAME: "RhFlow-Test"
          DEBUG: "true"
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "ci-test-secret-key-not-real"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          MINIO_ENDPOINT: "localhost:9000"
        run: python -m pytest backend/tests

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rhflow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rhflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max