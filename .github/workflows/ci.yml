name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  detect-changes:
    name: Detect Backend/Frontend/Infra Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.yml'
              - '.github/workflows/**'

  build-backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs:
      - detect-changes

    if: github.event_name == 'push' && needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run Ruff
        run: python -m ruff check backend/app backend/tests

      - name: Run Mypy
        run: python -m mypy --config-file backend/pyproject.toml backend/app backend/tests

      - name: Run tests
        env:
          APP_NAME: RhFlow-Test
          DEBUG: "true"
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-real
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          MINIO_ENDPOINT: localhost:9000
          MINIO_PUBLIC_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: ci-test-key
          MINIO_SECRET_KEY: ci-test-secret
          MINIO_BUCKET: rhflow-test
          MINIO_SECURE: "false"
          MINIO_PUBLIC_SECURE: "false"
          MINIO_PUBLIC_PATH_PREFIX: ""
        run: python -m pytest backend/tests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rhflow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rhflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs:
      - detect-changes

    if: github.event_name == 'push' && needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rhflow-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rhflow-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    needs:
      - detect-changes
      - build-backend
      - build-frontend

    if: >
      always() &&
      github.event_name == 'push' &&
      (
        needs.build-backend.result == 'success' ||
        needs.build-frontend.result == 'success' ||
        needs.detect-changes.outputs.infra == 'true'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            mkdir -p /home/${{ secrets.DROPLET_USER }}/rhflow
            cd /home/${{ secrets.DROPLET_USER }}/rhflow

            # Avoid SCP flakiness by pulling compose file directly from the current commit branch.
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml -o docker-compose.yml

            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            PGADMIN_DEFAULT_EMAIL=${{ secrets.PGADMIN_DEFAULT_EMAIL }}
            PGADMIN_DEFAULT_PASSWORD=${{ secrets.PGADMIN_DEFAULT_PASSWORD }}
            MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ROOT_USER }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_ROOT_PASSWORD }}
            MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
            MINIO_PUBLIC_ENDPOINT=${{ secrets.MINIO_PUBLIC_ENDPOINT }}
            MINIO_PUBLIC_PATH_PREFIX=${{ secrets.MINIO_PUBLIC_PATH_PREFIX }}
            MINIO_PUBLIC_SECURE=true
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            APP_NAME=RhFlow
            DEBUG=false
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            ALGORITHM=${{ secrets.ALGORITHM }}
            ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            EOF

            docker compose pull

            docker compose up -d --force-recreate --remove-orphans

            echo "Waiting for PostgreSQL..."
            sleep 10

            docker compose exec -T backend alembic upgrade head